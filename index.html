<!DOCTYPE html>
<html>
<head>
<title>Taxi Pro System</title>

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.box { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:green; color:white; border:none; }
</style>

</head>

<body>

<h2>🚕 Taxi Pro System</h2>

<div class="box">
<h3>Driver & Date</h3>
<select id="driver">
<option>Saqlain</option>
<option>Mudassar</option>
<option>Shujaat</option>
<option>Other</option>
</select>

<input type="date" id="date">
</div>

<div class="box">
<h3>Taximeter</h3>
<input id="taxiCash" placeholder="Cash">
<input id="taxiCard" placeholder="Card">
</div>

<div class="box">
<h3>Uber</h3>
<input id="uber" placeholder="Total">
</div>

<div class="box">
<h3>Cabify</h3>
<input id="cabifyCash" placeholder="Cash">
<input id="cabifyCard" placeholder="Card">
</div>

<div class="box">
<h3>Free Now</h3>
<input id="freeCash" placeholder="Cash">
<input id="freeCard" placeholder="Card">
</div>

<div class="box">
<h3>Fuel</h3>
<input id="fuel" placeholder="Fuel Cost">
<select id="fuelType">
<option>Company Card</option>
<option>Driver Cash</option>
</select>
</div>

<button onclick="saveEntry()">💾 Save Entry</button>
<button onclick="calculate()">📊 Calculate Total</button>

<div class="box">
<h3>Result</h3>
<p id="result"></p>
</div>

<div class="box">
<h3>Monthly Report</h3>

<select id="monthSelect">
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

<button onclick="filterMonthly()">📅 Show Monthly</button>
<button onclick="downloadMonthly()">⬇ Download</button>

<p id="monthly"></p>
</div>

<script>

// DATA LOAD
let data = JSON.parse(localStorage.getItem("taxiData")) || [];

// SAVE
function saveEntry() {

let entry = {
driver: document.getElementById("driver").value,
date: document.getElementById("date").value,

taxiCash: Number(document.getElementById("taxiCash").value)||0,
taxiCard: Number(document.getElementById("taxiCard").value)||0,

uber: Number(document.getElementById("uber").value)||0,

cabifyCash: Number(document.getElementById("cabifyCash").value)||0,
cabifyCard: Number(document.getElementById("cabifyCard").value)||0,

freeCash: Number(document.getElementById("freeCash").value)||0,
freeCard: Number(document.getElementById("freeCard").value)||0,

fuel: Number(document.getElementById("fuel").value)||0,
fuelType: document.getElementById("fuelType").value
};

data.push(entry);
localStorage.setItem("taxiData", JSON.stringify(data));

alert("Saved ✅");
}

// TOTAL CALCULATION
function calculate() {

let total=0, cash=0, card=0;

data.forEach(d=>{
total += d.taxiCash + d.taxiCard + d.uber + d.cabifyCash + d.cabifyCard + d.freeCash + d.freeCard;

cash += d.taxiCash + d.cabifyCash + d.freeCash;

card += d.taxiCard + d.uber + d.cabifyCard + d.freeCard;
});

document.getElementById("result").innerHTML =
"Total Work: €"+total+
"<br>Cash: €"+cash+
"<br>Card: €"+card;
}

// MONTH FILTER
function filterMonthly(){

let m = document.getElementById("monthSelect").value;

let total=0, cash=0, card=0;

data.forEach(d=>{
if(!d.date) return;

let dm = new Date(d.date).getMonth();

if(dm == m){
total += d.taxiCash + d.taxiCard + d.uber + d.cabifyCash + d.cabifyCard + d.freeCash + d.freeCard;

cash += d.taxiCash + d.cabifyCash + d.freeCash;

card += d.taxiCard + d.uber + d.cabifyCard + d.freeCard;
}
});

document.getElementById("monthly").innerHTML =
"Month Work: €"+total+
"<br>Cash: €"+cash+
"<br>Card: €"+card;
}

// DOWNLOAD
function downloadMonthly(){

let text = document.getElementById("monthly").innerText;

let blob = new Blob([text], {type:"text/plain"});
let link = document.createElement("a");

link.href = URL.createObjectURL(blob);
link.download = "monthly_report.txt";
link.click();
}

</script>

</body>
</html>
