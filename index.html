<!DOCTYPE html>
<html>
<head>
<title>Taxi Company System</title>

<style>
body { font-family: Arial; background:#eee; }
input, select, button { padding:10px; margin:5px; width:95%; }
button { background:#22c55e; color:white; border:none; }
.box { background:white; padding:10px; margin:10px; border-radius:10px; }
</style>

</head>

<body>

<h2>🚕 Taxi Company System</h2>

<div class="box">
<h3>Trip Details</h3>

<input type="text" id="name" placeholder="Driver Name">
<input type="number" id="fare" placeholder="Fare Amount">
<input type="number" id="fuel" placeholder="Fuel Cost">

<select id="fuelType">
<option value="Card">Company Card</option>
<option value="Cash">Cash</option>
</select>

<input type="date" id="date">

<select id="platform">
<option>Taximeter</option>
<option>Taximeter Card</option>
<option>Uber</option>
<option>Cabify</option>
<option>Free Now</option>
</select>

<button onclick="calculate()">Calculate</button>
</div>

<div class="box">
<h3>Result</h3>
<p id="result"></p>

<button onclick="downloadInvoice()">Download Invoice</button>
<button onclick="sendWhatsApp()">Send to WhatsApp</button>
</div>

<div class="box">
<h3>Report</h3>
<p id="report"></p>
</div>

<script>

let trips = JSON.parse(localStorage.getItem("trips")) || [];
let finalData = "";

function calculate() {
    let name = document.getElementById("name").value;
    let fare = Number(document.getElementById("fare").value);
    let fuel = Number(document.getElementById("fuel").value);
    let fuelType = document.getElementById("fuelType").value;
    let date = document.getElementById("date").value;
    let platform = document.getElementById("platform").value;

    let company = 0;
    let driver = 0;

    if (fuelType === "Card") {
        company = fare - fuel;
        driver = 0;
    } else {
        company = fare;
        driver = fare - fuel;
    }

    finalData = `
Driver: ${name}
Fare: ${fare}
Fuel: ${fuel}
Company: ${company}
Driver Profit: ${driver}
Date: ${date}
Platform: ${platform}
`;

    let trip = {name,fare,fuel,fuelType,date,platform,company,driver};
    trips.push(trip);
    localStorage.setItem("trips", JSON.stringify(trips));

    document.getElementById("result").innerHTML =
        `Driver: ${name}<br>Company: ${company}<br>Driver Profit: ${driver}`;

    generateReport();
}

function generateReport() {
    let today = new Date().toISOString().split("T")[0];

    let daily = 0, weekly = 0, monthly = 0;

    let platforms = {
        "Taximeter": 0,
        "Taximeter Card": 0,
        "Uber": 0,
        "Cabify": 0,
        "Free Now": 0
    };

    trips.forEach(t => {
        let tripDate = new Date(t.date);
        let now = new Date();

        if (t.date === today) daily += t.company;

        let diff = (now - tripDate)/(1000*60*60*24);
        if (diff <= 7) weekly += t.company;

        if (tripDate.getMonth() === now.getMonth())
            monthly += t.company;

        platforms[t.platform] += t.company;
    });

Weekly: ${weekly}<br>
