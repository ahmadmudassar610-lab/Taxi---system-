<!DOCTYPE html>
<html>
<head>
  <title>Taxi Pro System</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; padding:10px; }
    .box { background:white; padding:10px; margin:10px 0; border-radius:10px; }
    input, select, button { width:100%; padding:10px; margin:5px 0; }
    button { background:green; color:white; border:none; }
  </style>
</head>

<body>

<h1>🚖 Taxi Pro System</h1>

<div class="box">
<h3>Driver & Date</h3>
<select id="driver">
  <option>Saqlain</option>
  <option>Mudassar</option>
  <option>Shujaat</option>
  <option>Other</option>
</select>
<input type="date" id="date">
</div>

<div class="box">
<h3>Taximeter</h3>
<input type="number" id="taxiCash" placeholder="Cash">
<input type="number" id="taxiCard" placeholder="Card">
</div>

<div class="box">
<h3>Uber</h3>
<input type="number" id="uberTotal" placeholder="Total">
</div>

<div class="box">
<h3>Cabify</h3>
<input type="number" id="cabifyCash" placeholder="Cash">
<input type="number" id="cabifyCard" placeholder="Card">
</div>

<div class="box">
<h3>Free Now</h3>
<input type="number" id="freeCash" placeholder="Cash">
<input type="number" id="freeCard" placeholder="Card">
</div>

<div class="box">
<h3>Fuel</h3>
<input type="number" id="fuel" placeholder="Fuel">
<select id="fuelType">
  <option>Company Card</option>
  <option>Driver Cash</option>
</select>
</div>

<button onclick="calculate()">🧮 Calculate</button>
<button onclick="saveEntry()">💾 Save Entry</button>

<div class="box">
<h3>Result</h3>
<p id="result"></p>
</div>

<div class="box">
<h3>Reports</h3>

<select id="month">
  <option value="01">January</option>
  <option value="02">February</option>
  <option value="03">March</option>
  <option value="04">April</option>
  <option value="05">May</option>
  <option value="06">June</option>
  <option value="07">July</option>
  <option value="08">August</option>
  <option value="09">September</option>
  <option value="10">October</option>
  <option value="11">November</option>
  <option value="12">December</option>
</select>

<button onclick="showMonthly()">📊 Monthly Report</button>
<button onclick="driverReport()">👨‍✈️ Driver Report</button>
<button onclick="downloadReport()">⬇ Download</button>

<p id="report"></p>
</div>

<script>

let data = JSON.parse(localStorage.getItem("taxiData")) || [];

function calculate() {

  let taxiCash = Number(document.getElementById("taxiCash").value) || 0;
  let taxiCard = Number(document.getElementById("taxiCard").value) || 0;
  let uber = Number(document.getElementById("uberTotal").value) || 0;
  let cabifyCash = Number(document.getElementById("cabifyCash").value) || 0;
  let cabifyCard = Number(document.getElementById("cabifyCard").value) || 0;
  let freeCash = Number(document.getElementById("freeCash").value) || 0;
  let freeCard = Number(document.getElementById("freeCard").value) || 0;
  let fuel = Number(document.getElementById("fuel").value) || 0;
  let fuelType = document.getElementById("fuelType").value;

  let totalWork = taxiCash + taxiCard + uber + cabifyCash + cabifyCard + freeCash + freeCard;
  let totalCash = taxiCash + cabifyCash + freeCash;
  let totalCard = taxiCard + uber + cabifyCard + freeCard;

  let driverShare = totalWork * 0.5;
  let companyPay = driverShare - totalCash;

  if (fuelType === "Driver Cash") {
    companyPay -= fuel;
  }

  document.getElementById("result").innerHTML =
    "Total Work: €" + totalWork + "<br>" +
    "Cash: €" + totalCash + "<br>" +
    "Card: €" + totalCard + "<br><br>" +
    "Driver Share: €" + driverShare + "<br>" +
    "Company Pay: €" + companyPay;
}

function saveEntry() {

  let entry = {
    driver: document.getElementById("driver").value,
    date: document.getElementById("date").value,
    total: Number(document.getElementById("taxiCash").value || 0)
         + Number(document.getElementById("taxiCard").value || 0)
         + Number(document.getElementById("uberTotal").value || 0)
         + Number(document.getElementById("cabifyCash").value || 0)
         + Number(document.getElementById("cabifyCard").value || 0)
         + Number(document.getElementById("freeCash").value || 0)
         + Number(document.getElementById("freeCard").value || 0)
  };

  data.push(entry);
  localStorage.setItem("taxiData", JSON.stringify(data));

  alert("Saved Successfully!");
}

function showMonthly() {

  let month = document.getElementById("month").value;
  let total = 0;

  data.forEach(e => {
    if (e.date && e.date.includes("-" + month + "-")) {
      total += e.total;
    }
  });

  document.getElementById("report").innerHTML =
    "Monthly Total: €" + total;
}

function driverReport() {

  let report = {};

  data.forEach(e => {
    if (!report[e.driver]) report[e.driver] = 0;
    report[e.driver] += e.total;
  });

  let output = "<h4>Driver Report:</h4>";

  for (let d in report) {
    output += d + ": €" + report[d] + "<br>";
  }

  document.getElementById("report").innerHTML = output;
}

function downloadReport() {

  let text = document.getElementById("report").innerText;

  let blob = new Blob([text], { type: "text/plain" });
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "report.txt";
  link.click();
}

</script>

</body>
</html>
