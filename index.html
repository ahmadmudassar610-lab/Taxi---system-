<!DOCTYPE html>
<html>
<head>
  <title>Taxi System</title>
</head>
<body>

<h2>Driver Payment System</h2>

<input type="text" id="name" placeholder="Driver Name"><br><br>
<input type="number" id="total" placeholder="Total Work (€)"><br><br>
<input type="number" id="cash" placeholder="Cash Received (€)"><br><br>

<button onclick="saveData()">Save</button>

<h3>Records:</h3>
<ul id="list"></ul>

<script>
let records = JSON.parse(localStorage.getItem("drivers")) || [];

function saveData() {
  let name = document.getElementById("name").value;
  let total = parseFloat(document.getElementById("total").value);
  let cash = parseFloat(document.getElementById("cash").value);

  let companyShare = total * 0.5;
  let remaining = companyShare - cash;

  let data = {
    name,
    total,
    cash,
    remaining
  };

  records.push(data);
  localStorage.setItem("drivers", JSON.stringify(records));

  showData();
}

function showData() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach((d, i) => {
    let li = document.createElement("li");
    li.innerHTML = `
      ${d.name} - Total: €${d.total}, Cash: €${d.cash}, 
      Company Pay: €${d.remaining}
      <button onclick="deleteData(${i})">Delete</button>
    `;
    list.appendChild(li);
  });
}

function deleteData(index) {
  records.splice(index, 1);
  localStorage.setItem("drivers", JSON.stringify(records));
  showData();
}

// Load data on start
showData();
</script>

</body>
</html>
