<!DOCTYPE html>
<html>
<head>
    <title>Taxi Driver System</title>
</head>
<body>

<h2>Driver Entry</h2>

<input type="number" id="fare" placeholder="Total Fare (€)">
<input type="number" id="cash" placeholder="Cash Received (€)">
<input type="number" id="fuel" placeholder="Fuel by Driver (€)">

<br><br>

<button onclick="saveEntry()">Save Entry</button>
<button onclick="generateReport()">Monthly Report</button>

<h2>Report</h2>

<p>Total Fare: <span id="totalFare">0</span> €</p>
<p>Driver Share (50%): <span id="driverShare">0</span> €</p>
<p>Cash Received: <span id="totalCash">0</span> €</p>
<p>Fuel by Driver: <span id="totalFuel">0</span> €</p>
<p><b>Company Will Pay: <span id="finalPay">0</span> €</b></p>

<script>

let entries = [];

function saveEntry() {
    let fare = parseFloat(document.getElementById("fare").value) || 0;
    let cash = parseFloat(document.getElementById("cash").value) || 0;
    let fuel = parseFloat(document.getElementById("fuel").value) || 0;

    let entry = {
        fare: fare,
        cash: cash,
        fuel: fuel
    };

    entries.push(entry);

    alert("Entry Saved ✅");

    // clear inputs
    document.getElementById("fare").value = "";
    document.getElementById("cash").value = "";
    document.getElementById("fuel").value = "";
}

function generateReport() {

    let totalFare = 0;
    let totalCash = 0;
    let totalFuel = 0;

    entries.forEach(e => {
        totalFare += e.fare;
        totalCash += e.cash;
        totalFuel += e.fuel;
    });

    let driverShare = totalFare * 0.5;

    let finalPay = driverShare - totalCash + totalFuel;

    // show in UI
    document.getElementById("totalFare").innerText = totalFare;
    document.getElementById("driverShare").innerText = driverShare;
    document.getElementById("totalCash").innerText = totalCash;
    document.getElementById("totalFuel").innerText = totalFuel;
    document.getElementById("finalPay").innerText = finalPay;
}

</script>

</body>
</html>
