<!DOCTYPE html>
<html>
<head>
<title>Taxi Pro System</title>

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.box { background:white; padding:10px; margin:10px 0; border-radius:8px; }
input, select { width:100%; padding:8px; margin:5px 0; }
button { width:100%; padding:10px; margin:5px 0; background:green; color:white; border:none; }
</style>

</head>

<body>

<h2>🚖 Taxi Pro System</h2>

<div class="box">
<h3>Driver & Date</h3>

<select id="driver">
<option>Saqlain</option>
<option>Mudassar</option>
<option>Shujaat</option>
<option>Other</option>
</select>

<input type="date" id="date">
</div>

<div class="box">
<h3>Taximeter</h3>
<input type="number" id="tmCash" placeholder="Cash">
<input type="number" id="tmCard" placeholder="Card">
</div>

<div class="box">
<h3>Uber</h3>
<input type="number" id="uber" placeholder="Total">
</div>

<div class="box">
<h3>Cabify</h3>
<input type="number" id="cabCash" placeholder="Cash">
<input type="number" id="cabCard" placeholder="Card">
</div>

<div class="box">
<h3>Free Now</h3>
<input type="number" id="freeCash" placeholder="Cash">
<input type="number" id="freeCard" placeholder="Card">
</div>

<div class="box">
<h3>Fuel</h3>
<input type="number" id="fuel">
<select id="fuelType">
<option>Company Card</option>
<option>Driver Cash</option>
</select>
</div>

<button onclick="saveData()">💾 Save Entry</button>
<button onclick="calculate()">🧮 Calculate</button>

<div class="box">
<h3>Result</h3>
<p id="result"></p>
</div>

<div class="box">
<h3>Monthly Report</h3>

<select id="month">
<option value="01">January</option>
<option value="02">February</option>
<option value="03">March</option>
<option value="04">April</option>
<option value="05">May</option>
<option value="06">June</option>
<option value="07">July</option>
<option value="08">August</option>
<option value="09">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>
</select>

<button onclick="showMonthly()">📊 Show Monthly</button>
<button onclick="downloadMonthly()">⬇️ Download</button>

<p id="monthly"></p>

</div>

<div class="box">
<h3>Driver Report</h3>

<select id="driverFilter">
<option>Saqlain</option>
<option>Mudassar</option>
<option>Shujaat</option>
<option>Other</option>
</select>

<button onclick="driverReport()">👤 Show Driver Report</button>

<p id="driverResult"></p>

</div>

<script>

let db = JSON.parse(localStorage.getItem("taxiData")) || [];

function getValues(){
return {
driver: document.getElementById("driver").value,
date: document.getElementById("date").value,

tmCash: Number(document.getElementById("tmCash").value),
tmCard: Number(document.getElementById("tmCard").value),

uber: Number(document.getElementById("uber").value),

cabCash: Number(document.getElementById("cabCash").value),
cabCard: Number(document.getElementById("cabCard").value),

freeCash: Number(document.getElementById("freeCash").value),
freeCard: Number(document.getElementById("freeCard").value),

fuel: Number(document.getElementById("fuel").value),
fuelType: document.getElementById("fuelType").value
};
}

function calculate(){

let d = getValues();

let totalWork = d.tmCash + d.tmCard + d.uber + d.cabCash + d.cabCard + d.freeCash + d.freeCard;

let totalCash = d.tmCash + d.cabCash + d.freeCash;
let totalCard = d.tmCard + d.uber + d.cabCard + d.freeCard;

let driver = 0;
let company = 0;

if(d.fuelType === "Company Card"){
company = totalCard - d.fuel;
driver = totalCash;
}else{
company = totalCard;
driver = totalCash - d.fuel;
}

document.getElementById("result").innerHTML =
"Total Work: €"+totalWork+"<br>" +
"Cash: €"+totalCash+"<br>" +
"Card: €"+totalCard+"<br><br>" +
"Driver: €"+driver+"<br>" +
"Company: €"+company;

return {totalWork,totalCash,totalCard};
}

function saveData(){

let d = getValues();
let calc = calculate();

db.push({
...d,
...calc
});

localStorage.setItem("taxiData", JSON.stringify(db));

alert("Saved ✅");
}

function showMonthly(){

let m = document.getElementById("month").value;

let total=0, cash=0, card=0;

db.forEach(e=>{
if(e.date && e.date.split("-")[1]===m){
total+=e.totalWork;
cash+=e.totalCash;
card+=e.totalCard;
}
});

document.getElementById("monthly").innerHTML =
"Total: €"+total+"<br>Cash: €"+cash+"<br>Card: €"+card;
}

function downloadMonthly(){

let text = document.getElementById("monthly").innerText;

let blob = new Blob([text]);
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "monthly_report.txt";
a.click();
}

function driverReport(){

let driver = document.getElementById("driverFilter").value;

let total=0, cash=0, card=0;

db.forEach(e=>{
if(e.driver === driver){
total+=e.totalWork;
cash+=e.totalCash;
card+=e.totalCard;
}
});

document.getElementById("driverResult").innerHTML =
"Total Work: €"+total+"<br>Cash: €"+cash+"<br>Card: €"+card;

}

</script>

</body>
</html>
