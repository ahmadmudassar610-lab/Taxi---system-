<!DOCTYPE html>
<html>
<head>
<title>Taxi Company System</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
input, select, button { padding:10px; margin:5px; width:100%; }
button { background:#22c55e; color:white; border:none; }
.box { background:white; padding:15px; border-radius:10px; margin-top:10px; }
</style>

</head>

<body>

<h2>🚖 Taxi Company System</h2>

<div class="box">
<h3>Trip Details</h3>

<input id="name" placeholder="Driver Name">
<input id="fare" type="number" placeholder="Fare Amount">
<input id="fuel" type="number" placeholder="Fuel Cost">

<select id="fuelType">
<option value="Card">Company Card</option>
<option value="Cash">Driver Cash</option>
</select>

<button onclick="calculate()">Calculate</button>

</div>

<div class="box">
<h3>Result</h3>
<p id="result"></p>

<button onclick="downloadInvoice()">Download Invoice</button>
<button onclick="sendWhatsApp()">Send to WhatsApp</button>

</div>

<script>

let finalData = "";

function calculate() {
let name = document.getElementById("name").value;
let fare = Number(document.getElementById("fare").value);
let fuel = Number(document.getElementById("fuel").value);
let fuelType = document.getElementById("fuelType").value;

let company = 0;
let driver = 0;

if(fuelType === "Card") {
    company = fare - fuel;
    driver = 0;
} else {
    company = fare;
    driver = fare - fuel;
}

finalData = 
`Driver: ${name}
Fare: ${fare}
Fuel: ${fuel} (${fuelType})

Company: ${company}
Driver: ${driver}`;

document.getElementById("result").innerText = finalData;
}

// PDF Download
function downloadInvoice() {
let blob = new Blob([finalData], { type: "text/plain" });
let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "invoice.txt";
link.click();
}

// WhatsApp
function sendWhatsApp() {
let url = "https://wa.me/?text=" + encodeURIComponent(finalData);
window.open(url, "_blank");
}

</script>

</body>
</html>
