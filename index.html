<!DOCTYPE html>
<html>
<head>
  <title>Taxi Pro MAX</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; padding:10px; }
    .box { background:white; padding:10px; margin:10px 0; border-radius:10px; }
    input, select, button { width:100%; padding:10px; margin:5px 0; }
    button { background:#007bff; color:white; border:none; }
  </style>
</head>

<body>

<h1>🚖 Taxi Pro MAX</h1>

<div class="box">
<h3>Driver & Date</h3>
<select id="driver">
<option>Saqlain</option>
<option>Mudassar</option>
<option>Shujaat</option>
<option>Other</option>
</select>
<input type="date" id="date">
</div>

<div class="box">
<h3>Taximeter</h3>
<input type="number" id="tmCash" placeholder="Cash">
<input type="number" id="tmCard" placeholder="Card">
</div>

<div class="box">
<h3>Uber</h3>
<input type="number" id="uber" placeholder="Total (Card)">
</div>

<div class="box">
<h3>Cabify</h3>
<input type="number" id="cabCash" placeholder="Cash">
<input type="number" id="cabCard" placeholder="Card">
</div>

<div class="box">
<h3>Free Now</h3>
<input type="number" id="freeCash" placeholder="Cash">
<input type="number" id="freeCard" placeholder="Card">
</div>

<div class="box">
<h3>Fuel</h3>
<input type="number" id="fuel" placeholder="Fuel Cost">
<select id="fuelType">
<option>Company Card</option>
<option>Driver Cash</option>
</select>
</div>

<button onclick="calculate()">🧮 Calculate</button>
<button onclick="saveEntry()">💾 Save Entry</button>

<div class="box">
<h3>Result</h3>
<p id="result"></p>
</div>

<div class="box">
<h3>Reports</h3>

<select id="month">
<option value="01">January</option>
<option value="02">February</option>
<option value="03">March</option>
<option value="04">April</option>
<option value="05">May</option>
<option value="06">June</option>
<option value="07">July</option>
<option value="08">August</option>
<option value="09">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>
</select>

<button onclick="monthlyReport()">📊 Monthly Report</button>
<button onclick="dailyReport()">📅 Today Report</button>
<button onclick="driverReport()">👤 Driver Report</button>
<button onclick="download()">⬇ Download</button>

<p id="report"></p>
</div>

<script>

let db = JSON.parse(localStorage.getItem("taxiData")) || [];

function getData(){

let tmCash = Number(document.getElementById("tmCash").value)||0;
let tmCard = Number(document.getElementById("tmCard").value)||0;
let uber = Number(document.getElementById("uber").value)||0;
let cabCash = Number(document.getElementById("cabCash").value)||0;
let cabCard = Number(document.getElementById("cabCard").value)||0;
let freeCash = Number(document.getElementById("freeCash").value)||0;
let freeCard = Number(document.getElementById("freeCard").value)||0;
let fuel = Number(document.getElementById("fuel").value)||0;
let fuelType = document.getElementById("fuelType").value;

let totalWork = tmCash+tmCard+uber+cabCash+cabCard+freeCash+freeCard;
let totalCash = tmCash+cabCash+freeCash;
let totalCard = tmCard+uber+cabCard+freeCard;

// Driver 50%
let driverTotal = totalWork * 0.5;

// Cash adjust
let companyPay = driverTotal - totalCash;

// Fuel adjust
if(fuelType==="Driver Cash"){
companyPay -= fuel;
}

return {
driver: document.getElementById("driver").value,
date: document.getElementById("date").value,
totalWork,totalCash,totalCard,driverTotal,companyPay,fuel,fuelType
};

}

function calculate(){

let d = getData();

document.getElementById("result").innerHTML =
"Total Work: €"+d.totalWork+"<br>"+
"Cash: €"+d.totalCash+"<br>"+
"Card: €"+d.totalCard+"<br><br>"+
"Driver 50%: €"+d.driverTotal+"<br>"+
"Company Pay: €"+d.companyPay;

}

function saveEntry(){

let d = getData();
db.push(d);
localStorage.setItem("taxiData", JSON.stringify(db));
alert("Saved ✅");

}

function monthlyReport(){

let m = document.getElementById("month").value;

let total=0, company=0;

db.forEach(e=>{
if(e.date && e.date.includes("-"+m+"-")){
total+=e.totalWork;
company+=e.companyPay;
}
});

document.getElementById("report").innerHTML =
"Monthly Work: €"+total+"<br>Company Profit: €"+company;

}

function dailyReport(){

let today = new Date().toISOString().slice(0,10);

let total=0, company=0;

db.forEach(e=>{
if(e.date===today){
total+=e.totalWork;
company+=e.companyPay;
}
});

document.getElementById("report").innerHTML =
"Today Work: €"+total+"<br>Company Profit: €"+company;

}

function driverReport(){

let map = {};

db.forEach(e=>{
if(!map[e.driver]) map[e.driver]=0;
map[e.driver]+=e.companyPay;
});

let out="<h4>Driver Profit Report:</h4>";

for(let d in map){
out+=d+" → €"+map[d]+"<br>";
}

document.getElementById("report").innerHTML=out;

}

function download(){

let text = document.getElementById("report").innerText;

let blob = new Blob([text]);
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "report.txt";
a.click();
}

</script>

</body>
</html>
