<!DOCTYPE html>
<html>
<head>
<title>Taxi ULTRA System</title>

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }
.box { background:white; padding:10px; margin:10px 0; border-radius:10px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#222; color:white; border:none; }
h2 { text-align:center; }
</style>

</head>

<body>

<h2>🚖 Taxi ULTRA System</h2>

<div class="box">
<h3>Driver & Date</h3>
<select id="driver">
<option>Saqlain</option>
<option>Mudassar</option>
<option>Shujaat</option>
<option>Other</option>
</select>
<input type="date" id="date">
</div>

<div class="box">
<h3>Work</h3>
<input id="tmCash" placeholder="Taximeter Cash">
<input id="tmCard" placeholder="Taximeter Card">
<input id="uber" placeholder="Uber">
<input id="cabCash" placeholder="Cabify Cash">
<input id="cabCard" placeholder="Cabify Card">
<input id="freeCash" placeholder="FreeNow Cash">
<input id="freeCard" placeholder="FreeNow Card">
</div>

<div class="box">
<h3>Fuel</h3>
<input id="fuel" placeholder="Fuel">
<select id="fuelType">
<option>Company Card</option>
<option>Driver Cash</option>
</select>
</div>

<div class="box">
<h3>Company Balance (for partners)</h3>
<input id="companyBalance" placeholder="Enter total company balance">
</div>

<button onclick="calculate()">🧮 Calculate</button>
<button onclick="save()">💾 Save</button>

<div class="box">
<h3>Result</h3>
<p id="result"></p>
</div>

<div class="box">
<h3>Reports</h3>

<select id="month">
<option value="01">Jan</option>
<option value="02">Feb</option>
<option value="03">Mar</option>
<option value="04">Apr</option>
<option value="05">May</option>
<option value="06">Jun</option>
<option value="07">Jul</option>
<option value="08">Aug</option>
<option value="09">Sep</option>
<option value="10">Oct</option>
<option value="11">Nov</option>
<option value="12">Dec</option>
</select>

<button onclick="monthly()">Monthly</button>
<button onclick="daily()">Today</button>
<button onclick="driverReport()">Driver</button>
<button onclick="partners()">Partners</button>
<button onclick="invoice()">Invoice</button>

<p id="report"></p>

</div>

<script>

let db = JSON.parse(localStorage.getItem("taxi")) || [];

function get(){

let tmCash=+tmCash.value||0;
let tmCard=+tmCard.value||0;
let uberV=+uber.value||0;
let cabC=+cabCash.value||0;
let cabCd=+cabCard.value||0;
let freeC=+freeCash.value||0;
let freeCd=+freeCard.value||0;
let fuelV=+fuel.value||0;
let fuelTypeV=fuelType.value;

let total=tmCash+tmCard+uberV+cabC+cabCd+freeC+freeCd;
let cash=tmCash+cabC+freeC;
let card=tmCard+uberV+cabCd+freeCd;

let driver50=total*0.5;
let companyPay=driver50-cash;

if(fuelTypeV==="Driver Cash"){ companyPay-=fuelV; }

return {
driver:driver.value,
date:date.value,
total,cash,card,driver50,companyPay
};

}

function calculate(){

let d=get();

result.innerHTML=
"Total: €"+d.total+"<br>"+
"Cash: €"+d.cash+"<br>"+
"Card: €"+d.card+"<br><br>"+
"Driver 50%: €"+d.driver50+"<br>"+
"Company Pay: €"+d.companyPay;

}

function save(){

let d=get();
db.push(d);
localStorage.setItem("taxi",JSON.stringify(db));
alert("Saved ✅");

}

function monthly(){

let m=month.value;
let t=0,c=0;

db.forEach(e=>{
if(e.date && e.date.includes("-"+m+"-")){
t+=e.total;
c+=e.companyPay;
}
});

report.innerHTML="Monthly Work €"+t+"<br>Company €"+c;

}

function daily(){

let today=new Date().toISOString().slice(0,10);
let t=0,c=0;

db.forEach(e=>{
if(e.date===today){
t+=e.total;
c+=e.companyPay;
}
});

report.innerHTML="Today €"+t+"<br>Company €"+c;

}

function driverReport(){

let map={};

db.forEach(e=>{
if(!map[e.driver]) map[e.driver]=0;
map[e.driver]+=e.companyPay;
});

let out="";
for(let d in map){ out+=d+": €"+map[d]+"<br>"; }

report.innerHTML=out;

}

function partners(){

let balance=+companyBalance.value||0;

// Prius 4 partners
let p4=balance/4;

// Corolla 5 partners
let p5=balance/5;

report.innerHTML=
"Prius (4 partners): €"+p4+" each<br>"+
"Corolla (5 partners): €"+p5+" each";

}

function invoice(){

let text = result.innerText + "\n\n" + report.innerText;

let blob = new Blob([text]);
let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="invoice.txt";
a.click();

}

</script>

</body>
</html>
