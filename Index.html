<!DOCTYPE html>
<html>
<head>
  <title>Taxi Company System</title>
  <style>
    body { font-family: Arial; background:#020617; color:#fff; text-align:center; }
    input, select, button {
      padding:10px; margin:5px; border-radius:8px; border:none;
    }
    button { background:#22c55e; color:white; cursor:pointer; }
    .box { background:#0f172a; padding:20px; border-radius:15px; margin:20px; }
  </style>
</head>

<body>

<h1>🚖 Taxi Company Software</h1>

<div class="box">
<h2>Add Entry</h2>

<input type="date" id="date">

<select id="driver">
  <option>Saqlain</option>
  <option>Shujaat</option>
  <option>Mudassar</option>
  <option>Other</option>
</select>

<select id="car">
  <option>Prius</option>
  <option>Corolla</option>
</select>

<select id="platform">
  <option>Taximeter</option>
  <option>Uber</option>
  <option>Cabify</option>
  <option>FreeNow</option>
</select>

<br>

<input type="number" id="work" placeholder="Total Work €">
<input type="number" id="cash" placeholder="Cash €">
<input type="number" id="fuel" placeholder="Fuel Total €">

<br>

<button onclick="addEntry()">Save Entry</button>

</div>

<div class="box">
<h2>Weekly Calculation</h2>
<button onclick="calculate()">Calculate Week</button>
<h3 id="output"></h3>
</div>

<div class="box">
<h2>Dashboard</h2>
<h3 id="dashboard"></h3>
</div>

<div class="box">
<h2>Partner Profit</h2>

<input type="number" id="profit" placeholder="Total Profit €">

<select id="taxi">
  <option>Prius</option>
  <option>Corolla</option>
</select>

<button onclick="splitProfit()">Divide</button>
<h3 id="partners"></h3>

</div>

<div class="box">
<h2>Export Report</h2>
<button onclick="exportPDF()">Download Report</button>
<button onclick="sendWhatsApp()">WhatsApp Report</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("taxiData")) || [];

function addEntry() {
  let entry = {
    date: document.getElementById("date").value,
    driver: document.getElementById("driver").value,
    car: document.getElementById("car").value,
    platform: document.getElementById("platform").value,
    work: parseFloat(document.getElementById("work").value),
    cash: parseFloat(document.getElementById("cash").value),
    fuel: parseFloat(document.getElementById("fuel").value)
  };

  data.push(entry);
  localStorage.setItem("taxiData", JSON.stringify(data));

  alert("Saved Successfully!");
}

function calculate() {

  let totalWork = 0;
  let totalFuel = 0;

  data.forEach(e => {
    totalWork += e.work;
    totalFuel += e.fuel;
  });

  let result = "";

  data.forEach(e => {

    let driverShare = e.work * 0.5;
    let companyPay = driverShare - e.cash;

    let fuelShare = (e.work / totalWork) * (totalFuel * 0.5);

    let finalPay = companyPay - fuelShare;

    result += `
    <br>🚕 ${e.driver} (${e.car})
    <br>Work: €${e.work}
    <br>Final Pay: €${finalPay.toFixed(2)}
    <br>-------------------`;
  });

  document.getElementById("output").innerHTML = result;

  document.getElementById("dashboard").innerHTML =
    "Total Work: €" + totalWork +
    "<br>Total Fuel: €" + totalFuel +
    "<br>Company Profit: €" + (totalWork - totalWork*0.5 - totalFuel*0.5).toFixed(2);
}

function splitProfit() {
  let profit = document.getElementById("profit").value;
  let taxi = document.getElementById("taxi").value;

  let share = taxi == "Prius" ? profit/4 : profit/5;

  document.getElementById("partners").innerHTML =
    "Each Partner: €" + share.toFixed(2);
}

function exportPDF() {
  window.print();
}

function sendWhatsApp() {
  let text = document.getElementById("dashboard").innerText;
  let url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url);
}

</script>

</body>
</html>
